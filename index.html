<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkToVideo — by Vinay</title>

<style>
body{
  background:#030712;
  color:white;
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}
input{
  width:60%;
  padding:12px;
  border-radius:8px;
  border:none;
}
button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#6366f1;
  color:white;
  cursor:pointer;
}
img{
  margin-top:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>🎬 LinkToVideo</h1>

<input id="url" placeholder="Paste YouTube / Instagram URL">
<br><br>

<button onclick="fetchInfo()">Fetch</button>

<div id="result"></div>

<script>
const YTDLP_API = "https://ytdlp-api-lp7c.onrender.com";

async function ytdlpInfo(url) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 20000);

    const res = await fetch(
      `${YTDLP_API}/info?url=${encodeURIComponent(url)}`,
      {
        method: "GET",
        mode: "cors",
        signal: controller.signal
      }
    );

    clearTimeout(timeout);

    if (!res.ok) throw new Error("API Error");

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    return data;

  } catch (err) {
    console.error(err);
    throw new Error("Failed to fetch");
  }
}

async function fetchInfo() {
  const url = document.getElementById("url").value.trim();
  const result = document.getElementById("result");

  if (!url) {
    alert("Enter URL");
    return;
  }

  result.innerHTML = "Loading...";

  try {
    const data = await ytdlpInfo(url);

    result.innerHTML = `
      <h3>${data.title}</h3>
      <img src="${data.thumbnail}" width="300">
      <br><br>
      <button onclick="downloadVideo('${url}')">
        Download
      </button>
    `;

  } catch (e) {
    result.innerHTML = "❌ Failed to fetch";
  }
}

function downloadVideo(url) {
  window.open(
    `${YTDLP_API}/download?url=${encodeURIComponent(url)}&itag=22`,
    "_blank"
  );
}
</script>

</body>
</html>
